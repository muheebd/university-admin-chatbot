<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Al-Hikmah Admin Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <style>
    :root {
      --green:       #00563b;
      --green-dark:  #003d2a;
      --green-light: #d1e7dd;
      --green-pale:  #f0f7f4;
      --text:        #1a2e25;
      --muted:       #6b7c74;
      --border:      #dde8e3;
      --white:       #ffffff;
      --shadow:      0 8px 32px rgba(0,86,59,0.12);
      --radius:      16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #e8f0ec;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(0,86,59,0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(0,86,59,0.06) 0%, transparent 50%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* ── Main Layout ── */
    #app {
      display: flex;
      gap: 16px;
      width: 100%;
      max-width: 1000px;
      height: 620px;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 240px;
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }

    #sidebar-header {
      background: var(--green);
      padding: 20px 16px 16px;
      color: white;
    }

    #sidebar-header .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 15px;
      line-height: 1.3;
      margin-bottom: 4px;
    }

    #sidebar-header .subtitle {
      font-size: 11px;
      opacity: 0.75;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* Student profile card */
    #profile-card {
      margin: 12px;
      padding: 12px;
      background: var(--green-pale);
      border-radius: 10px;
      border: 1px solid var(--border);
      display: none;
    }

    #profile-card.visible { display: block; }

    #profile-card .profile-name {
      font-weight: 600;
      font-size: 13px;
      color: var(--text);
      margin-bottom: 4px;
    }

    #profile-card .profile-detail {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.8;
    }

    #profile-card .profile-badge {
      display: inline-block;
      background: var(--green);
      color: white;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 20px;
      margin-top: 6px;
      font-weight: 500;
    }

    /* Quick replies */
    #quick-section {
      padding: 0 12px;
      flex: 1;
      overflow-y: auto;
    }

    #quick-section .section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin: 14px 0 8px;
    }

    .quick-btn {
      display: block;
      width: 100%;
      text-align: left;
      background: var(--green-pale);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      color: var(--text);
      cursor: pointer;
      margin-bottom: 6px;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
      line-height: 1.3;
    }

    .quick-btn:hover {
      background: var(--green-light);
      border-color: var(--green);
      color: var(--green-dark);
    }

    .quick-btn .btn-icon { margin-right: 6px; }

    /* Sidebar footer */
    #sidebar-footer {
      padding: 12px;
      border-top: 1px solid var(--border);
    }

    #clear-btn {
      display: block;
      width: 100%;
      padding: 8px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
      margin-bottom: 6px;
    }

    #clear-btn:hover { border-color: #cc3300; color: #cc3300; background: #fff5f5; }

    #history-btn {
      display: block;
      width: 100%;
      padding: 8px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }

    #history-btn:hover { border-color: var(--green); color: var(--green); background: var(--green-pale); }

    /* ── Chat Panel ── */
    #chat-panel {
      flex: 1;
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #chat-header {
      background: var(--green);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #chat-header .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #chat-header .avatar {
      width: 38px;
      height: 38px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    #chat-header .header-text .title {
      font-family: 'DM Serif Display', serif;
      font-size: 16px;
      color: white;
    }

    #chat-header .header-text .status {
      font-size: 11px;
      color: rgba(255,255,255,0.7);
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 2px;
    }

    #chat-header .status-dot {
      width: 6px;
      height: 6px;
      background: #5fffb0;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    #logout-btn {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
      display: none;
    }

    #logout-btn:hover { background: rgba(255,255,255,0.25); }
    #logout-btn.visible { display: block; }

    /* Chat box */
    #chat-box {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: var(--green-pale);
    }

    .message-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      animation: fadeUp 0.3s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message-row.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
    }

    .bot-avatar { background: var(--green); color: white; }
    .user-avatar { background: var(--green-dark); color: white; }

    .msg-bubble-wrap { display: flex; flex-direction: column; max-width: 72%; }
    .message-row.user .msg-bubble-wrap { align-items: flex-end; }

    .message {
      padding: 11px 15px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.55;
      word-wrap: break-word;
    }

    .bot-msg {
      background: var(--white);
      color: var(--text);
      border-bottom-left-radius: 4px;
      border: 1px solid var(--border);
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }

    .user-msg {
      background: var(--green);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .msg-time {
      font-size: 10px;
      color: var(--muted);
      margin-top: 4px;
      padding: 0 4px;
    }

    /* Typing indicator */
    #typing-indicator {
      display: none;
      align-items: flex-end;
      gap: 8px;
      animation: fadeUp 0.3s ease;
    }

    #typing-indicator.visible { display: flex; }

    .typing-bubble {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      padding: 12px 16px;
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .typing-dot {
      width: 7px;
      height: 7px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    /* Input area */
    #input-area {
      padding: 14px 16px;
      border-top: 1px solid var(--border);
      background: var(--white);
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #user-input {
      flex: 1;
      padding: 11px 16px;
      border: 1.5px solid var(--border);
      border-radius: 24px;
      outline: none;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      background: var(--green-pale);
      transition: border-color 0.2s;
    }

    #user-input:focus { border-color: var(--green); background: white; }

    #send-btn {
      width: 42px;
      height: 42px;
      background: var(--green);
      color: white;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
    }

    #send-btn:hover { background: var(--green-dark); }
    #send-btn:active { transform: scale(0.93); }

    #send-btn svg { width: 18px; height: 18px; fill: white; }

    /* ── History Modal ── */
    #history-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    #history-modal.open { display: flex; }

    #history-content {
      background: white;
      border-radius: var(--radius);
      width: 100%;
      max-width: 520px;
      max-height: 70vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }

    #history-header {
      background: var(--green);
      color: white;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #history-header span {
      font-family: 'DM Serif Display', serif;
      font-size: 16px;
    }

    #close-history {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #history-list {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .history-session {
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .history-session-header {
      background: var(--green-pale);
      padding: 10px 14px;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }

    .history-msg {
      padding: 8px 14px;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }

    .history-msg:last-child { border-bottom: none; }

    .history-msg .h-role {
      font-weight: 600;
      color: var(--green);
      min-width: 36px;
      font-size: 11px;
      padding-top: 1px;
    }

    .history-msg .h-text { color: var(--text); line-height: 1.4; }

    #history-empty {
      text-align: center;
      color: var(--muted);
      padding: 40px 20px;
      font-size: 14px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

    /* Responsive */
    @media (max-width: 700px) {
      #app { flex-direction: column; height: auto; }
      #sidebar { width: 100%; height: auto; }
      #chat-panel { height: 500px; }
      #quick-section { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px 12px; }
      #quick-section .section-label { width: 100%; }
      .quick-btn { width: auto; flex: 1 1 40%; }
    }
  </style>
</head>
<body>

<div id="app">

  <!-- ── Sidebar ── -->
  <div id="sidebar">
    <div id="sidebar-header">
      <div class="logo">Al-Hikmah University</div>
      <div class="subtitle">Admin Assistant</div>
    </div>

    <!-- Profile Card (shown after login) -->
    <div id="profile-card">
      <div class="profile-name" id="profile-name">—</div>
      <div class="profile-detail" id="profile-detail">—</div>
      <span class="profile-badge" id="profile-badge">Student</span>
    </div>

    <div id="quick-section">
      <div class="section-label">Quick Questions</div>
      <button class="quick-btn" onclick="quickSend('What are the admission requirements?')">
        <span class="btn-icon">📋</span>Admission Requirements
      </button>
      <button class="quick-btn" onclick="quickSend('What courses are offered?')">
        <span class="btn-icon">📚</span>Available Courses
      </button>
      <button class="quick-btn" onclick="quickSend('How do I register for courses?')">
        <span class="btn-icon">✏️</span>Course Registration
      </button>
      <button class="quick-btn" onclick="quickSend('How do I pay my school fees?')">
        <span class="btn-icon">💳</span>Pay School Fees
      </button>
      <button class="quick-btn" onclick="quickSend('How to apply for hostel?')">
        <span class="btn-icon">🏠</span>Hostel Application
      </button>
      <button class="quick-btn" onclick="quickSend('When does the semester start?')">
        <span class="btn-icon">📅</span>Academic Calendar
      </button>
      <button class="quick-btn" onclick="quickSend('Are there scholarships available?')">
        <span class="btn-icon">🏆</span>Scholarships
      </button>
      <button class="quick-btn" onclick="quickSend('How can I contact the university?')">
        <span class="btn-icon">📞</span>Contact University
      </button>

      <div class="section-label">My Account</div>
      <button class="quick-btn" onclick="quickSend('What is my fee balance?')">
        <span class="btn-icon">💰</span>My Fee Balance
      </button>
      <button class="quick-btn" onclick="quickSend('What courses am I registered for?')">
        <span class="btn-icon">📝</span>My Courses
      </button>
      <button class="quick-btn" onclick="quickSend('What is my CGPA?')">
        <span class="btn-icon">📊</span>My Results
      </button>
      <button class="quick-btn" onclick="quickSend('Did I get a hostel?')">
        <span class="btn-icon">🛏️</span>My Accommodation
      </button>
      <button class="quick-btn" onclick="quickSend('Show me my last payment')">
        <span class="btn-icon">🧾</span>Payment Receipt
      </button>
    </div>

    <div id="sidebar-footer">
      <button id="history-btn" onclick="openHistory()">🕐 View Chat History</button>
      <button id="clear-btn" onclick="clearChat()">🗑️ Clear Chat</button>
    </div>
  </div>

  <!-- ── Chat Panel ── -->
  <div id="chat-panel">
    <div id="chat-header">
      <div class="header-left">
        <div class="avatar">🎓</div>
        <div class="header-text">
          <div class="title">Admin Assistant</div>
          <div class="status">
            <span class="status-dot"></span>
            Online — Ready to help
          </div>
        </div>
      </div>
      <button id="logout-btn" onclick="sendLogout()">Sign Out</button>
    </div>

    <div id="chat-box">
      <div class="message-row">
        <div class="msg-avatar bot-avatar">🎓</div>
        <div class="msg-bubble-wrap">
          <div class="message bot-msg">
            Hello! I am the Al-Hikmah Intelligent Administrative Assistant. How can I help you today?
          </div>
          <div class="msg-time" id="welcome-time"></div>
        </div>
      </div>
    </div>

    <!-- Typing Indicator -->
    <div id="typing-indicator">
      <div class="msg-avatar bot-avatar" style="margin-left:20px">🎓</div>
      <div class="typing-bubble">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>

    <div id="input-area">
      <input type="text" id="user-input" placeholder="Type your question here..." autocomplete="off" />
      <button id="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<!-- ── History Modal ── -->
<div id="history-modal">
  <div id="history-content">
    <div id="history-header">
      <span>Chat History</span>
      <button id="close-history" onclick="closeHistory()">✕</button>
    </div>
    <div id="history-list"></div>
  </div>
</div>

<script>
  // ── State ──
  let chatHistory   = JSON.parse(localStorage.getItem('alhikmah_history') || '[]');
  let currentSession = [];
  let isLoggedIn    = false;
  let studentName   = '';

  // ── Helpers ──
  function getTime() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function getDate() {
    return new Date().toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });
  }

  // Set welcome timestamp
  document.getElementById('welcome-time').textContent = getTime();

  // ── Render a message ──
  function appendMessage(text, role) {
    const chatBox  = document.getElementById('chat-box');
    const isBot    = role === 'bot';
    const time     = getTime();

    const row = document.createElement('div');
    row.className = 'message-row' + (isBot ? '' : ' user');

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar ' + (isBot ? 'bot-avatar' : 'user-avatar');
    avatar.textContent = isBot ? '🎓' : '👤';

    const wrap = document.createElement('div');
    wrap.className = 'msg-bubble-wrap';

    const bubble = document.createElement('div');
    bubble.className = 'message ' + (isBot ? 'bot-msg' : 'user-msg');
    bubble.textContent = text;

    const ts = document.createElement('div');
    ts.className = 'msg-time';
    ts.textContent = time;

    wrap.appendChild(bubble);
    wrap.appendChild(ts);
    row.appendChild(avatar);
    row.appendChild(wrap);
    chatBox.appendChild(row);
    chatBox.scrollTop = chatBox.scrollHeight;

    // Save to session
    currentSession.push({ role, text, time });
  }

  // ── Send Message ──
  function sendMessage() {
    const input   = document.getElementById('user-input');
    const message = input.value.trim();
    if (!message) return;

    appendMessage(message, 'user');
    input.value = '';

    // Show typing indicator
    const typing = document.getElementById('typing-indicator');
    typing.classList.add('visible');
    document.getElementById('chat-box').scrollTop = 99999;

    fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message }),
    })
    .then(r => r.json())
    .then(data => {
      typing.classList.remove('visible');
      // Strip hidden profile tag before displaying
      const cleanReply = data.reply.replace(/\[PROFILE:.*?\]\s*/g, '');
      appendMessage(cleanReply, 'bot');
      handleLoginState(message, data.reply);
    })
    .catch(() => {
      typing.classList.remove('visible');
      appendMessage('Sorry, something went wrong. Please try again.', 'bot');
    });
  }

  // ── Quick Send ──
  function quickSend(text) {
    document.getElementById('user-input').value = text;
    sendMessage();
  }

  // ── Detect login / logout from replies ──
  function handleLoginState(userMsg, botReply) {
    // Login success detection
    if (botReply.startsWith('Login successful,')) {
      isLoggedIn = true;
      const nameMatch    = botReply.match(/Login successful, (.+?)\./);
      const profileMatch = botReply.match(/\[PROFILE: (.+?) \| (.+?) \| Level (.+?)\]/);
      if (nameMatch) {
        studentName = nameMatch[1];
        const matric  = profileMatch ? profileMatch[1] : '';
        const dept    = profileMatch ? profileMatch[2] : '';
        const level   = profileMatch ? profileMatch[3] : '';
        showProfile(studentName, matric, dept, level);
        document.getElementById('logout-btn').classList.add('visible');
      }
    }
    // Logout detection
    const logoutPhrases = ['logout', 'log out', 'sign out', 'signout'];
    if (logoutPhrases.includes(userMsg.toLowerCase().trim()) || botReply.includes('logged out successfully')) {
      clearLoginState();
    }
  }

  // ── Show student profile in sidebar ──
  function showProfile(name, matric, dept, level) {
    const card    = document.getElementById('profile-card');
    document.getElementById('profile-name').textContent   = name;
    document.getElementById('profile-detail').innerHTML   =
      (matric ? `<b>${matric}</b><br>` : '') +
      (dept   ? `${dept}<br>`         : '') +
      (level  ? `Level ${level}`      : 'Authenticated Student');
    document.getElementById('profile-badge').textContent  = '✓ Logged In';
    card.classList.add('visible');
  }

  function clearLoginState() {
    isLoggedIn   = false;
    studentName  = '';
    document.getElementById('profile-card').classList.remove('visible');
    document.getElementById('logout-btn').classList.remove('visible');
  }

  // ── Logout ──
  function sendLogout() {
    document.getElementById('user-input').value = 'logout';
    sendMessage();
  }

  // ── Clear Chat ──
  function clearChat() {
    if (!confirm('Clear the current chat? This cannot be undone.')) return;

    // Save current session to history before clearing
    if (currentSession.length > 0) {
      chatHistory.push({
        date: getDate(),
        time: getTime(),
        messages: [...currentSession]
      });
      localStorage.setItem('alhikmah_history', JSON.stringify(chatHistory));
    }

    const chatBox = document.getElementById('chat-box');
    chatBox.innerHTML = '';
    currentSession = [];

    // Re-add welcome message
    const row = document.createElement('div');
    row.className = 'message-row';
    row.innerHTML = `
      <div class="msg-avatar bot-avatar">🎓</div>
      <div class="msg-bubble-wrap">
        <div class="message bot-msg">Hello! I am the Al-Hikmah Intelligent Administrative Assistant. How can I help you today?</div>
        <div class="msg-time">${getTime()}</div>
      </div>`;
    chatBox.appendChild(row);
  }

  // ── Chat History Modal ──
  function openHistory() {
    const modal    = document.getElementById('history-modal');
    const listEl   = document.getElementById('history-list');
    listEl.innerHTML = '';

    // Save current session so it shows up in history view
    const allSessions = currentSession.length > 0
      ? [...chatHistory, { date: 'Current Session', time: '', messages: currentSession }]
      : chatHistory;

    if (allSessions.length === 0) {
      listEl.innerHTML = '<div id="history-empty">No chat history yet.</div>';
    } else {
      // Show newest first
      [...allSessions].reverse().forEach(session => {
        const block = document.createElement('div');
        block.className = 'history-session';

        const hdr = document.createElement('div');
        hdr.className = 'history-session-header';
        hdr.textContent = session.date + (session.time ? ' · ' + session.time : '');
        block.appendChild(hdr);

        session.messages.forEach(msg => {
          const row = document.createElement('div');
          row.className = 'history-msg';
          row.innerHTML = `
            <span class="h-role">${msg.role === 'bot' ? 'BOT' : 'YOU'}</span>
            <span class="h-text">${msg.text}</span>`;
          block.appendChild(row);
        });

        listEl.appendChild(block);
      });
    }

    modal.classList.add('open');
  }

  function closeHistory() {
    document.getElementById('history-modal').classList.remove('open');
  }

  // Close modal on background click
  document.getElementById('history-modal').addEventListener('click', function(e) {
    if (e.target === this) closeHistory();
  });

  // Enter key to send
  document.getElementById('user-input').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') sendMessage();
  });
</script>
</body>
</html>
